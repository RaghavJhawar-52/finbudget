<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 130" fill="none">
  <defs>
    <linearGradient id="bgS" x1="0" y1="0" x2="80" y2="80" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#4338ca"/>
    </linearGradient>
  </defs>

  <!-- ── Icon (centered, 80×80) ── -->
  <rect x="20" y="0" width="80" height="80" rx="20" fill="url(#bgS)"/>
  <rect x="20" y="0" width="80" height="37" rx="20" fill="white" opacity="0.06"/>

  <!-- Bars -->
  <rect x="30" y="47" width="14" height="22" rx="4" fill="white" opacity="0.35"/>
  <rect x="53" y="33" width="14" height="36" rx="4" fill="white" opacity="0.60"/>
  <rect x="76" y="15" width="14" height="54" rx="4" fill="white" opacity="0.95"/>

  <path d="M 37 43 C 50 33, 67 24, 83 11"
        stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.85"/>
  <path d="M 76 9 L 83 11 L 81 18"
        stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>
  <circle cx="37" cy="43" r="3" fill="white" opacity="0.9"/>
  <circle cx="60" cy="30" r="3" fill="white" opacity="0.9"/>
  <circle cx="83" cy="11" r="3.5" fill="white"/>

  <!-- ── Stacked wordmark ── -->
  <!-- "Fin" + "Budget" on same line, centered under icon -->
  <text x="60" y="108"
    text-anchor="middle"
    font-family="Inter, system-ui, -apple-system, sans-serif"
    font-size="22" letter-spacing="-0.8"
    fill="#312e81">
    <tspan font-weight="300" fill="#6366f1">Fin</tspan><tspan font-weight="700">Budget</tspan>
  </text>

  <!-- Tagline -->
  <text x="60" y="124"
    text-anchor="middle"
    font-family="Inter, system-ui, -apple-system, sans-serif"
    font-size="8.5" font-weight="400" letter-spacing="2"
    fill="#a5b4fc">PERSONAL FINANCE</text>
</svg>
