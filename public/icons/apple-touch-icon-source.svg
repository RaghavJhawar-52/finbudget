<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Full-bleed background (NO rounded corners — iOS applies its own squircle mask) -->
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#4338ca"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" fill="url(#bgGrad)"/>

  <!-- Bar 1 — short, leftmost -->
  <rect x="62"  y="288" width="82" height="144" rx="18" fill="white" opacity="0.35"/>
  <!-- Bar 2 — medium -->
  <rect x="215" y="195" width="82" height="237" rx="18" fill="white" opacity="0.60"/>
  <!-- Bar 3 — tall, rightmost -->
  <rect x="368" y="92"  width="82" height="340" rx="18" fill="white" opacity="0.95"/>

  <!-- Trend line connecting bar tops -->
  <path d="M 103 268 C 175 216, 295 155, 409 72"
        stroke="white" stroke-width="22" stroke-linecap="round" opacity="0.85"/>

  <!-- Arrow tip -->
  <path d="M 370 55 L 409 72 L 392 112"
        stroke="white" stroke-width="22" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>

  <!-- Dots on trend line -->
  <circle cx="103" cy="268" r="18" fill="white" opacity="0.9"/>
  <circle cx="256" cy="178" r="18" fill="white" opacity="0.9"/>
  <circle cx="409" cy="72"  r="20" fill="white"/>
</svg>
