<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#4338ca"/>
    </linearGradient>
    <!-- Soft glow behind bars -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="100" height="100" rx="22" fill="url(#bgGrad)"/>

  <!-- Inner subtle highlight (glass effect top edge) -->
  <rect x="0" y="0" width="100" height="46" rx="22" fill="white" opacity="0.06"/>

  <!-- ── Bar chart (3 bars, bottom-aligned at y=82) ── -->

  <!-- Bar 1  short, leftmost -->
  <rect x="12" y="56" width="16" height="28" rx="4" fill="white" opacity="0.35"/>
  <!-- Bar 2  medium -->
  <rect x="42" y="38" width="16" height="46" rx="4" fill="white" opacity="0.60"/>
  <!-- Bar 3  tall, rightmost — fully opaque to anchor the eye -->
  <rect x="72" y="18" width="16" height="66" rx="4" fill="white" opacity="0.95"/>

  <!-- ── Trend line connecting bar tops ── -->
  <!-- control points chosen to pass near bar2 top: (50,35) -->
  <path d="M 20 52 C 34 42, 58 30, 80 14"
        stroke="white" stroke-width="2.8" stroke-linecap="round"
        opacity="0.85"/>

  <!-- Arrow tip at end of trend line -->
  <path d="M 72 12 L 80 14 L 78 22"
        stroke="white" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"
        opacity="0.85"/>

  <!-- Dots on trend line at each bar top -->
  <circle cx="20" cy="52" r="3.5" fill="white" opacity="0.9"/>
  <circle cx="50" cy="35" r="3.5" fill="white" opacity="0.9"/>
  <circle cx="80" cy="14" r="4"   fill="white"/>
</svg>
